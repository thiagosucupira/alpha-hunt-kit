name: alpha-hunt-kit
version: 0.1.0
purpose: >
  Package the research discipline, not a private agent runtime. The loop imports
  outside ideas, turns them into killable hypotheses, runs one cheap local test,
  and records promote/block/kill verdicts in durable state.

reads:
  - public idea-source notes or API outputs
  - local OHLC fixtures or user-supplied canonical bars
  - state/current.json
  - state/experiments.tsv
  - state/graveyard.jsonl

writes:
  - .alpha-hunt/runs/<run_id>/metrics.json
  - .alpha-hunt/runs/<run_id>/report.md
  - state/experiments.tsv
  - state/leaderboard.tsv
  - state/graveyard.jsonl
  - state/current.json when explicitly promoted

never_touches:
  - live trading permissions
  - broker credentials
  - private memory stores
  - account ids
  - messaging delivery targets
  - machine-specific absolute paths

first_run_contract:
  - runs fully offline against fixtures/bars/demo_ohlcv.csv
  - creates local state without secrets
  - produces a report and metrics artifact
  - can promote or bury a result explicitly
  - fails gracefully when optional adapters are unavailable
